name: Deploy GitHub Pages Redirect

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect page
        run: |
          mkdir -p dist
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <meta http-equiv="refresh" content="0; url=https://gpt-image-playground.cooksleep.dev" />
              <link rel="canonical" href="https://gpt-image-playground.cooksleep.dev" />
              <title>GPT Image Playground</title>
            </head>
            <body></body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: redirect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
